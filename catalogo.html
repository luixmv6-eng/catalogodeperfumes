<head>

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background-color: #0a0a0a;
      background-image:

      color: #f5f5f5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    header {
      background: transparent;
      padding: 60px 20px 40px;
      text-align: center;
      border-bottom: 1px solid rgba(212, 175, 55, 0.3);
      position: relative;
    }
    
    header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at center, rgba(212, 175, 55, 0.35) 0%, transparent 80%);
      z-index: -1;
    }

    header h1 {
      margin: 0 0 15px;
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      font-weight: 600;
      color: #d4af37;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    }

    header p {
      margin: 0 0 20px;
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 2px;
      color: #ccc;
      text-transform: uppercase;
      text-shadow: 0 1px 5px rgba(0,0,0,0.8);
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin-top: 15px;
    }

    .social-link {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      transition: transform 0.3s ease;
      opacity: 0;
      animation: fadeInUp 0.8s ease 0.4s forwards;
    }
    
    .social-link:hover {
      transform: scale(1.1);
    }
    
    .social-icon {
      width: 36px;
      height: 36px;
      stroke: #d4af37;
      fill: #0a0a0a;
      stroke-width: 1.5;
      transition: all 0.3s ease;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }
    
    .social-text {
      color: #d4af37;
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 1px;
      transition: color 0.3s ease;
    }
    
    .social-link:hover .social-icon {
      stroke: #fff;
      fill: #d4af37;
    }
    
    .social-link:hover .social-text {
      color: #fff;
    }

    .controls {
      max-width: 1200px;
      margin: 40px auto 20px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 20px;
    }

    .controls input,
    .controls select {
      padding: 14px 20px;
      border: 1px solid #333;
      border-radius: 4px;
      font-size: 14px;
      font-family: 'Montserrat', sans-serif;
      background: #141414;
      color: #fff;
      transition: all 0.3s ease;
      outline: none;
    }

    .controls input:focus,
    .controls select:focus {
      border-color: #d4af37;
      box-shadow: 0 0 0 1px rgba(212, 175, 55, 0.2);
    }

    .controls input::placeholder {
      color: #666;
    }

    .summary {
      max-width: 1200px;
      margin: 0 auto 30px;
      padding: 0 20px;
      font-size: 13px;
      color: #666;
      letter-spacing: 1px;
    }

    .catalog {
      max-width: 1200px;
      margin: 0 auto 60px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 30px;
    }

    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      min-height: 450px;
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: #444;
      box-shadow: 0 15px 30px rgba(0,0,0,0.6);
    }

    .img-wrap {
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      background: #ffffff;
      border-radius: 6px;
      overflow: hidden;
      padding: 10px;
    }

    .img-wrap img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
      transition: transform 0.5s ease;
    }

    .card:hover .img-wrap img {
      transform: scale(1.05);
    }

    .brand {
      color: #d4af37;
      font-size: 11px;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: 600;
      letter-spacing: 2px;
    }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      line-height: 1.3;
      margin-bottom: 15px;
      color: #fff;
      flex-grow: 1;
    }

    .price {
      font-size: 18px;
      font-weight: 500;
      color: #fff;
      letter-spacing: 1px;
      border-top: 1px solid #222;
      padding-top: 15px;
      margin-top: auto;
    }

    .no-results {
      max-width: 1200px;
      margin: 60px auto;
      padding: 0 20px;
      color: #888;
      font-size: 16px;
      text-align: center;
      display: none;
    }

    .contact-prompt {
      margin-top: 15px;
      font-size: 15px;
      color: #aaa;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      margin-top: 40px;
      border-top: 1px solid rgba(212, 175, 55, 0.15);
      color: #888;
      font-size: 14px;
      letter-spacing: 1px;
    }

    footer a, .no-results a {
      color: #d4af37;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    footer a:hover, .no-results a:hover {
      color: #fff;
      text-decoration: underline;
    }

    @media (max-width: 900px) {
      .controls {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 560px) {
      .controls {
        grid-template-columns: 1fr;
      }
      header h1 {
        font-size: 2.5rem;
      }
    }

    @media (max-width: 768px) {
      header {
        padding: 40px 20px 30px;
      }
      header h1 {
        font-size: 3rem;
      }
      .catalog {
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
      }
      .card {
        min-height: 400px;
      }
    }

    @media (max-width: 480px) {
      header {
        padding: 30px 15px 20px;
      }
      header h1 {
        font-size: 2.2rem;
        letter-spacing: 2px;
      }
      header p {
        font-size: 1rem;
      }
      .controls {
        padding: 0 15px;
      }
      .catalog {
        padding: 0 15px;
        gap: 15px;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
      .card {
        padding: 15px;
        min-height: 320px;
      }
      .img-wrap {
        height: 150px;
      }
      .name {
        font-size: 16px;
      }
      .price {
        font-size: 16px;
      }
      .social-text {
        display: none;
      }
    }
  
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }
    ::-webkit-scrollbar-track {
      background: #050505;
    }
    ::-webkit-scrollbar-thumb {
      background: #222;
      border-radius: 5px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #d4af37;
    }

    /* Sticky Controls Wrapper */
    .controls-wrapper {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 10, 0.75);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 20px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      margin-bottom: 30px;
      transition: box-shadow 0.3s ease;
    }
    
    .controls {
      margin: 0 auto;
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in-up {
      opacity: 0;
      animation: fadeInUp 0.7s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
    }

    /* Card Shine Effect */
    .card {
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.04) 50%, rgba(255,255,255,0) 100%);
      transform: skewX(-25deg);
      transition: all 0.7s ease;
      z-index: 1;
      pointer-events: none;
    }
    .card:hover::before {
      left: 200%;
    }

    /* Catalog transition state */
    .catalog {
      transition: opacity 0.3s ease;
    }
    .catalog.updating {
      opacity: 0;
    }

    /* Header Animation */
    header h1 {
      opacity: 0;
      animation: fadeInUp 0.8s ease forwards;
    }
    header p {
      opacity: 0;
      animation: fadeInUp 0.8s ease 0.2s forwards;
    }

  </style>
</head>

    const noResults = document.getElementById('noResults');

    function formatPrice(value) {
      return '$' + value.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    function populateBrands() {
      const brands = [...new Set(products.map(p => p.brand))].sort((a,b) => a.localeCompare(b));
      brands.forEach(brand => {
        const option = document.createElement('option');
        option.value = brand;
        option.textContent = brand;
        brandFilter.appendChild(option);
      });
    }

    // Intersection Observer for scroll animations
    const observerOptions = {
      root: null,
      rootMargin: '50px',
      threshold: 0.1
    };

    const observer = new IntersectionObserver((entries, observer) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.style.animationPlayState = 'running';
          observer.unobserve(entry.target);
        }
      });
    }, observerOptions);

    function renderProducts(list) {
      const catalogEl = document.getElementById('catalog');
      
      // Smooth transition out
      catalogEl.classList.add('updating');
      
      setTimeout(() => {
        catalogEl.innerHTML = '';

        if (!list.length) {
          noResults.style.display = 'block';
          noResults.classList.add('fade-in-up');
          noResults.style.animationPlayState = 'running';
          summaryText.textContent = '0 productos encontrados';
          catalogEl.classList.remove('updating');
          return;
        }

        noResults.style.display = 'none';
        summaryText.textContent = `${list.length} producto(s) encontrados`;

        list.forEach((product, index) => {
          const card = document.createElement('article');
          card.className = 'card fade-in-up';
          
          // Stagger animation delay based on index (max 12 to avoid huge delays)
          const delay = Math.min((index % 12) * 0.08, 0.8);
          card.style.animationDelay = `${delay}s`;
          card.style.animationPlayState = 'paused'; // Pause until in view

          card.innerHTML = `
            <div class="img-wrap">
              <img src="${product.img}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/240x220?text=Sin+Imagen';">
            </div>
            <div class="brand">${product.brand}</div>
            <div class="name">${product.name}</div>
            <div class="price">
              ${formatPrice(product.price)}
            </div>
          `;
          catalogEl.appendChild(card);
          observer.observe(card);
        });
        
        // Smooth transition in
        catalogEl.classList.remove('updating');
      }, 300); // Wait for fade out
    }

    // Add sticky header shadow effect on scroll
    window.addEventListener('scroll', () => {
      const controlsWrapper = document.querySelector('.controls-wrapper');
      if (window.scrollY > 50) {
        controlsWrapper.style.boxShadow = '0 10px 30px rgba(0,0,0,0.6)';
      } else {
        controlsWrapper.style.boxShadow = 'none';
      }
    });

    function normalizeText(text) {
      return text
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[’'`´]/g, '');
    }

    function applyFilters() {
      let filtered = [...products];

      const search = normalizeText(searchInput.value.trim());
      const brand = brandFilter.value;
      const sort = sortFilter.value;

      if (search) {
        filtered = filtered.filter(p =>
          normalizeText(p.name).includes(search) ||
          normalizeText(p.brand).includes(search)
        );
      }

      if (brand !== 'all') {
        filtered = filtered.filter(p => p.brand === brand);
      }

      if (sort === 'price-asc') {
        filtered.sort((a,b) => a.price - b.price);
      } else if (sort === 'price-desc') {
        filtered.sort((a,b) => b.price - a.price);
      } else if (sort === 'name-asc') {
        filtered.sort((a,b) => a.name.localeCompare(b.name));
      } else if (sort === 'name-desc') {
        filtered.sort((a,b) => b.name.localeCompare(a.name));
      }

      renderProducts(filtered);
    }

    populateBrands();
    renderProducts(products);

    searchInput.addEventListener('input', applyFilters);
    brandFilter.addEventListener('change', applyFilters);
    sortFilter.addEventListener('change', applyFilters);
  </script>

</body>
</html>
